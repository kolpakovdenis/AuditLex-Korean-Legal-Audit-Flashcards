<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>AuditLex: Контракты & Аудит | Корейский язык</title>
    <style>
        :root {
            --bg-page: #f0f4f9; --card-bg: #ffffff; --text-primary: #1a2c3e; --text-secondary: #2c5282;
            --accent: #096b8f; --accent-soft: #e6f0f5; --border: #cbdbe0; --shadow: rgba(0,0,0,0.08);
            --header-bg: #ffffffcc; --icon-fav: #e6a017; --nav-btn: #dee6ef; --footer-text: #5a6e7c;
            --example-bg: #f7fafc; --new-badge: #8b5cf6;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        body.dark {
            --bg-page: #121826; --card-bg: #1e2a36; --text-primary: #eef2ff; --text-secondary: #bbd4f0;
            --accent: #5da5c4; --accent-soft: #1f2e3c; --border: #334155; --shadow: rgba(0,0,0,0.4);
            --header-bg: #121826cc; --nav-btn: #2a3748; --footer-text: #8da0b5; --example-bg: #17212b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans KR', 'Roboto', sans-serif;
            background: var(--bg-page); color: var(--text-primary); padding: 0 14px 28px; min-height: 100vh;
            line-height: 1.5; -webkit-font-smoothing: antialiased;
        }
        
        
        /* Шапка: скрытие без анимации и без смещения */
        .header {
            position: relative; top: 0; left: 0; right: 0; 
            background: var(--header-bg); 
            padding: 12px 18px; border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 999;
            display: flex; justify-content: space-between; align-items: center; gap: 12px;
            visibility: visible;
            opacity: 1;
            transition: visibility 0s linear 0s, opacity 0s linear;
        }
       
        h1 { font-size: 1.65rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), #2c8faa); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .sub { font-size: 0.72rem; color: var(--footer-text); margin-top: 3px; }
        .theme-toggle {
            background: var(--nav-btn); border: none; padding: 8px 15px; border-radius: 40px;
            font-weight: 600; cursor: pointer; color: var(--text-primary); font-size: 0.82rem;
            transition: var(--transition);
        }
        .theme-toggle:hover { transform: scale(1.04); }
        
        .topics-scroll {
            display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;
            padding: 4px 0 8px; scrollbar-width: thin; scroll-snap-type: x mandatory;
            cursor: grab;
        }
        .topics-scroll:active { cursor: grabbing; }
        .topics-scroll::-webkit-scrollbar { height: 4px; }
        .topics-scroll::-webkit-scrollbar-track { background: var(--border); border-radius: 4px; }
        .topics-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        .topic-btn {
            flex: 0 0 auto; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 100px; padding: 6px 14px; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; color: var(--text-secondary); transition: var(--transition);
            white-space: nowrap; box-shadow: 0 1px 3px var(--shadow); scroll-snap-align: start;
        }
        .topic-btn:hover { transform: translateY(-1px); background: var(--accent-soft); }
        .topic-btn.active {
            background: var(--accent); color: white; border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(9,107,143,0.25);
        }
        .topic-star { background: var(--icon-fav); color: #1e2f3e; }
        body.dark .topic-star { color: #1a2a3a; }
        
        .progress-wrap { margin: 4px 4px 14px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--footer-text); margin-bottom: 5px; font-weight: 500; }
        .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #2c8faa); border-radius: 3px; transition: width 0.3s ease; width: 0%; }
        
        .flashcard {
            background: var(--card-bg); border-radius: 44px; padding: 22px 18px 26px;
            box-shadow: 0 16px 38px var(--shadow); border: 1px solid var(--border);
            margin: 0 0 20px; position: relative; overflow: hidden;
        }
        .flashcard::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent), #2c8faa, var(--accent)); opacity: 0.85;
        }
        .card-top { text-align: center; margin-bottom: 6px; animation: slideIn 0.25s ease; }
        @keyframes slideIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
        
        .term-korean {
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            font-weight: 800; line-height: 1.4;
            color: var(--text-primary); font-family: 'Noto Sans KR', system-ui;
            margin: 6px 0 12px; padding: 18px 12px; background: var(--accent-soft);
            border-radius: 36px; cursor: pointer; transition: var(--transition);
            word-break: break-word;
            overflow-wrap: break-word;
            text-align: center;
        }
        .term-korean:hover { transform: scale(1.01); background: var(--accent-soft); }
        .term-korean:active { transform: scale(0.995); }
        
        .hint-english {
            font-size: 1.21rem; font-weight: 600; color: var(--accent);
            background: var(--bg-page); padding: 10px 16px; border-radius: 34px;
            display: inline-block; border: 1px dashed var(--border); letter-spacing: 0.1px;
            max-width: 100%;
        }
        
        .accordion { margin: 14px 0; border-radius: 26px; overflow: hidden; }
        .accordion-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--accent-soft); cursor: pointer;
            border: 1px solid var(--border); border-radius: 26px; transition: var(--transition);
            font-weight: 600; color: var(--text-primary);
        }
        .accordion-header:hover { background: rgba(9,107,143,0.1); }
        .accordion-header.open { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        .accordion-icon { font-size: 1rem; transition: transform 0.2s ease; }
        .accordion-header.open .accordion-icon { transform: rotate(180deg); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: var(--card-bg); border: 1px solid var(--border); border-top: none; border-radius: 0 0 26px 26px; }
        .accordion-content.open { max-height: 200px; }
        .accordion-inner { padding: 16px 18px; }
        .translation-text {
            font-size: 1.43rem; font-weight: 700; text-align: center; color: var(--text-primary);
            word-break: break-word;
        }
        
        .example-section { margin-top: 16px; }
        .example-label {
            font-weight: 700; font-size: 0.77rem; text-transform: uppercase; letter-spacing: 1.3px;
            color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
        }
        .example-preview {
            background: var(--example-bg); border-radius: 26px; padding: 14px 16px;
            border: 1px solid var(--border); cursor: pointer; transition: var(--transition);
        }
        .example-preview:hover { box-shadow: 0 4px 12px var(--shadow); }
        .example-kor {
            font-size: 1.155rem; font-family: 'Noto Sans KR', system-ui; color: var(--text-primary);
            font-weight: 500; line-height: 1.5;
            word-break: break-word;
            overflow-wrap: break-word;
            margin-bottom: 0;
        }
        .example-hint {
            text-align: right; font-size: 0.8rem; color: var(--accent); margin-top: 6px;
            font-weight: 600; display: flex; justify-content: flex-end; gap: 4px;
        }
        .example-expanded {
            max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
            background: var(--example-bg); border: 1px solid var(--border); border-radius: 26px;
        }
        .example-expanded.open { max-height: 280px; }
        .example-expanded-inner { padding: 14px 16px; }
        .example-ru {
            font-size: 1.045rem; color: var(--text-secondary); line-height: 1.5;
            border-top: 1px dashed var(--border); padding-top: 10px; margin-top: 2px;
            word-break: break-word;
        }
        
        /* УМЕНЬШЕННЫЕ НАВИГАЦИОННЫЕ КНОПКИ — стали компактнее на ~15% */
        .nav-row { 
            display: flex; 
            justify-content: space-between; 
            gap: 8px; 
            margin: 18px 0 8px; 
        }
        .nav-btn {
            background: var(--nav-btn); 
            border: none; 
            padding: 8px 0;  /* было 12px 0 — уменьшили */
            border-radius: 48px;  /* было 58px — чуть меньше */
            font-size: 1.5rem;  /* было 1.8rem — уменьшили */
            cursor: pointer; 
            flex: 0.8;  /* было 1 — сделали компактнее */
            text-align: center;
            color: var(--text-primary); 
            font-weight: 600; 
            transition: var(--transition);
        }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--shadow); }
        .nav-btn:active { transform: scale(0.985); }
        .fav-btn {
            background: var(--nav-btn); 
            border: none; 
            font-size: 1.5rem;  /* было 1.8rem — уменьшили */
            font-weight: 600;
            padding: 8px 0;  /* было 12px 0 — уменьшили */
            border-radius: 48px;  /* было 58px — чуть меньше */
            cursor: pointer; 
            flex: 0.8;  /* было 1.1 — сделали компактнее */
            text-align: center;
            color: var(--text-primary); 
            transition: var(--transition);
        }
        .fav-btn.fav-active {
            background: var(--icon-fav); 
            color: #1e2f3e; 
            animation: starPop 0.25s ease;
        }
        @keyframes starPop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
        
        /* Блок дополнительных кнопок — гармонирует с навигацией */
        .extra-actions { 
            display: flex; 
            gap: 8px; 
            margin-top: 12px;  /* было 14px — чуть уменьшили */
            justify-content: center; 
        }
        .action-btn {
            background: var(--nav-btn); 
            border: none; 
            padding: 8px 12px;  /* было 8px 14px — чуть уже */
            border-radius: 46px;
            font-size: 0.78rem;  /* было 0.8rem — чуть меньше */
            font-weight: 600; 
            cursor: pointer; 
            color: var(--text-primary);
            display: flex; 
            align-items: center; 
            gap: 4px; 
            transition: var(--transition);
        }
        .action-btn:hover { transform: translateY(-1px); background: var(--accent-soft); }
        
        .footer-note {
            margin-top: 26px; text-align: center; background: var(--accent-soft);
            border-radius: 32px; padding: 18px 14px; font-size: 0.86rem; color: var(--footer-text);
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .quote { font-style: italic; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); line-height: 1.4; }
        .daily-quote { font-size: 0.75rem; margin-top: 6px; opacity: 0.9; }
        
        @media (max-width: 480px) {
            .header { padding: 10px 16px; } h1 { font-size: 1.5rem; }
            .term-korean { font-size: clamp(1.3rem, 5.5vw, 2rem); padding: 14px 10px; }
            .hint-english { font-size: 1rem; }
            .translation-text { font-size: 1.3rem; }
            .example-kor { font-size: 1rem; }
            .flashcard { padding: 18px 14px 22px; }
            /* Адаптация уменьшенных кнопок под мобильные */
            .nav-btn, .fav-btn { font-size: 1.3rem; padding: 6px 0; flex: 0.7; }
            .action-btn { padding: 6px 10px; font-size: 0.72rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div>
            <h1>📘 AuditLex</h1>
            <div class="sub">계약 · 감사 · 책임</div>
        </div>
        <button class="theme-toggle" id="themeToggle">🌓 Тема</button>
    </header>

    <nav class="topics-scroll" id="topicsContainer"></nav>

    <div class="progress-wrap">
        <div class="progress-label"><span>Прогресс</span><span id="progressText">1 / 28</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <main class="flashcard">
        <div class="card-top">
            <div class="term-korean" id="koreanTerm">—</div>
            <div class="hint-english" id="englishHint">💡 разбор слова</div>
        </div>
        
        <section class="accordion" id="transSection">
            <button class="accordion-header" id="transToggle" aria-expanded="false">
                <span>🇷🇺 Показать перевод</span><span class="accordion-icon">▼</span>
            </button>
            <div class="accordion-content" id="transContent">
                <div class="accordion-inner">
                    <div class="translation-text" id="transText"></div>
                </div>
            </div>
        </section>
        
        <section class="example-section">
            <div class="example-label">📌 В КОНТЕКСТЕ</div>
            <div class="example-preview" id="exPreview" role="button" tabindex="0">
                <div class="example-kor" id="exKor">계약서 조항 예시</div>
                <div class="example-hint">▶ Показать перевод примера</div>
            </div>
            <div class="example-expanded" id="exExpanded">
                <div class="example-expanded-inner">
                    <div class="example-ru" id="exRu">Пример использования в контексте</div>
                </div>
            </div>
        </section>

        <nav class="nav-row">
            <button class="nav-btn" id="prevBtn" title="Предыдущий">◀</button>
            <button class="fav-btn" id="favBtn" title="Избранное">☆</button>
            <button class="nav-btn" id="nextBtn" title="Следующий">▶</button>
        </nav>
        
        <div class="extra-actions">
            <button class="action-btn" id="randomBtn" title="Случайная карточка">🎲 Случайная</button>
            <button class="action-btn" id="resetBtn" title="Сброс к первому">🔄 Сброс</button>
        </div>
    </main>

    <footer class="footer-note" id="quoteContainer" title="Нажмите для новой цитаты">
        <div class="quote" id="dailyQuote">"정확한 용어가 계약의 힘입니다"<br>— Точный термин — сила договора</div>
        <div class="daily-quote">🔍 공인회계사법 · 감사조서 · 배상책임 · 연결재무제표 — стань экспертом!</div>
    </footer>
</div>

<script>
// ==================== ПОЛНЫЙ СПИСОК ТЕРМИНОВ (138+ С РУССКИМИ ПОДСКАЗКАМИ) ====================

    { kor: "공인회계사법", rus: "Закон о сертифицированных бухгалтерах", hint_ru: "공인 (гос. аттестат) + 회계사 (бухгалтер) + 법 (закон)", topic: "law_duty", exKor: "공인회계사법에 따라 감사인은 독립성을 유지해야 한다.", exRus: "Согласно Закону, аудитор должен сохранять независимость." },

// Функция для случайной цитаты (не сохраняется в localStorage)
function setRandomQuote() {
    const randomIndex = Math.floor(Math.random() * quotes.length);
    const quote = quotes[randomIndex];
    document.getElementById('dailyQuote').innerHTML = `"${quote.kor}"<br>— ${quote.rus}`;
}

// Функция показа цитаты дня (циклически)
function showDailyQuote() {
    const today = new Date().toLocaleDateString('ru-RU');
    const stored = localStorage.getItem('auditLexQuote');
    if (stored) {
        try {
            const { date, index } = JSON.parse(stored);
            if (date === today) {
                const quote = quotes[index % quotes.length];
                document.getElementById('dailyQuote').innerHTML = `"${quote.kor}"<br>— ${quote.rus}`;
                return;
            }
        } catch(e) {}
    }
    let newIndex = 0;
    if (stored) {
        try {
            const { index } = JSON.parse(stored);
            newIndex = (index + 1) % quotes.length;
        } catch(e) {}
    }
    const quote = quotes[newIndex];
    document.getElementById('dailyQuote').innerHTML = `"${quote.kor}"<br>— ${quote.rus}`;
    localStorage.setItem('auditLexQuote', JSON.stringify({ date: today, index: newIndex }));
}

function getCardId(card) { return fullGlossary.findIndex(c => c.kor === card.kor && c.rus === card.rus); }

function updateActiveTopicButton(topicKey) {
    document.querySelectorAll(".topic-btn").forEach(btn => {
        const btnTopic = Object.keys(TOPICS).find(k => TOPICS[k] === btn.textContent);
        if (btnTopic === topicKey) btn.classList.add("active");
        else btn.classList.remove("active");
    });
}

function updateUI() {
    if (!state.cards.length) {
        el.term.textContent = "📭 Нет результатов";
        el.hint.textContent = "💡 измените запрос";
        el.transText.textContent = "";
        el.exKor.textContent = "—";
        el.exRu.textContent = "—";
        el.pFill.style.width = "0%";
        el.pText.textContent = "0 / 0";
        closeAll();
        return;
    }
    const card = state.cards[state.index];
    el.term.textContent = card.kor;
    el.hint.innerHTML = `💡 ${card.hint_ru || card.rus}`;
    el.transText.textContent = card.rus;
    el.exKor.textContent = card.exKor;
    el.exRu.textContent = card.exRus;
    
    const pct = ((state.index + 1) / state.cards.length) * 100;
    el.pFill.style.width = `${pct}%`;
    el.pText.textContent = `${state.index + 1} / ${state.cards.length}`;
    
    const id = getCardId(card);
    if (state.favIds.has(id)) {
        el.fav.innerHTML = "★";
        el.fav.classList.add("fav-active");
        el.fav.title = "Удалить из избранного";
    } else {
        el.fav.innerHTML = "☆";
        el.fav.classList.remove("fav-active");
        el.fav.title = "В избранное";
    }
    closeAll();
    
    if (state.search.trim() !== "") {
        const newTopic = card.topic;
        if (state.topic !== newTopic) {
            state.topic = newTopic;
            updateActiveTopicButton(state.topic);
        }
    }
}

function closeAll() {
    state.transOpen = false; el.transContent.classList.remove("open"); el.transToggle.classList.remove("open"); 
    if(el.transToggle.querySelector('.accordion-icon')) el.transToggle.querySelector('.accordion-icon').textContent = "▼";
    state.exOpen = false; el.exExpanded.classList.remove("open"); 
    if(el.exPreview.querySelector('.example-hint')) el.exPreview.querySelector('.example-hint').textContent = "▶ Показать перевод примера";
}

function filterCards() {
    let cards = fullGlossary;
    const isSearchActive = state.search.trim() !== "";
    
    if (!isSearchActive && state.topic !== "favorites") {
        cards = cards.filter(c => c.topic === state.topic);
    } else if (state.topic === "favorites" && !isSearchActive) {
        cards = Array.from(state.favIds).map(id => fullGlossary[id]).filter(Boolean);
    } else if (isSearchActive) {
        const q = state.search.toLowerCase();
        cards = cards.filter(c => c.kor.toLowerCase().includes(q) || c.rus.toLowerCase().includes(q) || (c.hint_ru && c.hint_ru.toLowerCase().includes(q)));
    }
    
    if (isSearchActive && cards.length > 0) {
        const firstTopic = cards[0].topic;
        if (state.topic !== firstTopic) {
            state.topic = firstTopic;
            updateActiveTopicButton(state.topic);
        }
    } else if (!isSearchActive && state.topic !== "favorites") {
        updateActiveTopicButton(state.topic);
    }
    
    state.cards = cards;
    if (state.index >= cards.length && cards.length > 0) state.index = 0;
    if (cards.length === 0) state.index = 0;
    updateUI();
}

function toggleTrans() { if(!state.cards.length) return; state.transOpen=!state.transOpen; el.transContent.classList.toggle('open', state.transOpen); el.transToggle.classList.toggle('open', state.transOpen); if(el.transToggle.querySelector('.accordion-icon')) el.transToggle.querySelector('.accordion-icon').textContent = state.transOpen ? "▲" : "▼"; }
function toggleEx() { if(!state.cards.length) return; state.exOpen=!state.exOpen; el.exExpanded.classList.toggle('open', state.exOpen); if(el.exPreview.querySelector('.example-hint')) el.exPreview.querySelector('.example-hint').textContent = state.exOpen ? "▲ Скрыть перевод" : "▶ Показать перевод примера"; }
function next() { if(!state.cards.length) return; state.index=(state.index+1)%state.cards.length; updateUI(); }
function prev() { if(!state.cards.length) return; state.index=(state.index-1+state.cards.length)%state.cards.length; updateUI(); }
function rand() {
    if(!state.cards.length) return;
    state.index = Math.floor(Math.random() * state.cards.length);
    updateUI();
    setRandomQuote();
}

function toggleFav() {
    if(!state.cards.length) return;
    const id = getCardId(state.cards[state.index]);
    if (state.favIds.has(id)) state.favIds.delete(id);
    else state.favIds.add(id);
    localStorage.setItem("auditFav_v5", JSON.stringify([...state.favIds]));
    if (state.topic === "favorites") filterCards();
    else updateUI();
}

function loadFav() {
    const saved = localStorage.getItem("auditFav_v5");
    if (saved) { try { state.favIds = new Set(JSON.parse(saved)); } catch(e) {} }
}

function buildTopics() {
    el.topics.innerHTML = "";
    Object.entries(TOPICS).forEach(([key, label]) => {
        const btn = document.createElement("button");
        btn.className = `topic-btn${state.topic===key?" active":""}`;
        if(key==="favorites") btn.classList.add("topic-star");
        btn.textContent = label;
        btn.onclick = () => {
            state.topic = key;
            state.search = "";
            document.querySelectorAll(".topic-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            filterCards();
        };
        el.topics.appendChild(btn);
    });
}

function init() {
    if(state.theme==="dark") document.body.classList.add("dark");
    loadFav();
    buildTopics();
    filterCards();
    showDailyQuote();
    
    el.prev.onclick = prev; el.next.onclick = next; el.fav.onclick = toggleFav;
    el.transToggle.onclick = toggleTrans;
    el.exPreview.onclick = toggleEx;
    el.rand.onclick = rand;
    el.reset.onclick = () => { state.index=0; updateUI(); };
    
    el.tToggle.onclick = () => {
        document.body.classList.toggle("dark");
        state.theme = document.body.classList.contains("dark") ? "dark" : "light";
        localStorage.setItem("auditTheme", state.theme);
    };
    
    document.onkeydown = e => {
        if (e.target.tagName === "INPUT") return;
        if (e.key==="ArrowRight") next();
        else if (e.key==="ArrowLeft") prev();
        else if (e.key===" ") { e.preventDefault(); toggleTrans(); }
        else if (e.key==="Enter") toggleEx();
    };
    
    el.topics.addEventListener('wheel', (e) => {
        if (Math.abs(e.deltaY) > 0) {
            e.preventDefault();
            el.topics.scrollLeft += e.deltaY;
        }
    }, { passive: false });
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
